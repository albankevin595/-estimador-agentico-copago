<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaludClara · Asistente Inteligente de Copago</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070C18;
    --ink:#EAF1FB;
    --muted:#8597B3;
    --faint:#5B6B86;
    --cyan:#22D3EE;
    --blue:#3B82F6;
    --mint:#34E0B0;
    --teal:#5EEAD4;
    --panel:rgba(255,255,255,.05);
    --panel-line:rgba(255,255,255,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);background:var(--bg);
    min-height:100vh;-webkit-font-smoothing:antialiased;overflow:hidden;position:relative;
  }
  /* Atmósfera de fondo */
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(820px 560px at 18% -8%,rgba(59,130,246,.20),transparent 60%),
      radial-gradient(760px 520px at 92% 108%,rgba(52,224,176,.16),transparent 60%),
      radial-gradient(620px 420px at 60% 50%,rgba(34,211,238,.07),transparent 70%);}
  body::after{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.04;
    background-image:radial-gradient(rgba(255,255,255,.6) 1px,transparent 1px);background-size:3px 3px;}

  .wrap{position:relative;z-index:1;width:100%;max-width:720px;margin:0 auto;height:100vh;
    display:flex;flex-direction:column;padding:0 22px}

  /* ============ ORBE (la IA) ============ */
  .orb{position:relative;border-radius:50%;flex:0 0 auto;
    background:radial-gradient(circle at 34% 30%,#BFFCEF,var(--teal) 26%,var(--cyan) 50%,var(--blue) 78%,#1E3A8A);
    box-shadow:0 0 50px rgba(34,211,238,.40),0 0 110px rgba(59,130,246,.22),inset 0 0 26px rgba(255,255,255,.35);
    animation:breathe 4.2s ease-in-out infinite}
  .orb::after{content:"";position:absolute;inset:-5px;border-radius:50%;
    background:conic-gradient(from 0deg,transparent,rgba(94,234,212,.7),transparent 38%,rgba(59,130,246,.6),transparent 72%,rgba(34,211,238,.5),transparent);
    filter:blur(7px);opacity:.85;animation:spin 7s linear infinite}
  .orb.think{animation:breathe 1.5s ease-in-out infinite}
  .orb.think::after{animation:spin 1.8s linear infinite;opacity:1}
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ============ ENTRADA "DESPERTAR" de Clara ============ */
  .awaken{position:absolute;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:20px;background:radial-gradient(circle at 50% 44%,rgba(7,12,24,.55),var(--bg) 72%);
    animation:fade .3s ease both}
  .awaken.out{animation:awakenOut .55s ease forwards}
  @keyframes awakenOut{to{opacity:0;visibility:hidden}}
  .awaken .scene{position:relative;width:160px;height:160px;display:grid;place-items:center}
  .awaken .orb{width:108px;height:108px;
    animation:awaken 1.1s cubic-bezier(.2,.9,.25,1.05) both,breathe 4.2s ease-in-out 1.1s infinite}
  .awaken .flash{position:absolute;width:108px;height:108px;border-radius:50%;pointer-events:none;
    background:radial-gradient(circle,rgba(255,255,255,.95),rgba(94,234,212,.4) 40%,transparent 70%);
    animation:flash 1s ease-out both}
  .awaken .ring{position:absolute;width:108px;height:108px;border-radius:50%;border:2px solid var(--cyan);
    pointer-events:none;animation:ripple 1.5s ease-out both}
  .awaken .ring:nth-child(3){animation-delay:.18s;border-color:var(--teal)}
  .awaken .ring:nth-child(4){animation-delay:.36s;border-color:var(--blue)}
  .awaken .lbl{font-size:12.5px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--cyan);
    opacity:0;animation:rise .5s ease .75s both}
  @keyframes awaken{0%{transform:scale(.15);opacity:0;filter:brightness(2.4)}
    55%{transform:scale(1.18);opacity:1;filter:brightness(1.6)}100%{transform:scale(1);opacity:1;filter:brightness(1)}}
  @keyframes flash{0%{opacity:0;transform:scale(.3)}22%{opacity:.95}100%{opacity:0;transform:scale(2.6)}}
  @keyframes ripple{0%{transform:scale(.6);opacity:.75}100%{transform:scale(3.4);opacity:0}}

  /* ============ INTRO / selección de plan ============ */
  .intro{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:30px 0;overflow:visible;animation:fade .6s ease both}
  .intro .orb{width:108px;height:108px;margin-bottom:8px}
  .eyebrow{margin-top:26px;font-size:11.5px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;
    color:var(--cyan)}
  .intro h1{font-size:30px;font-weight:800;letter-spacing:-.025em;margin-top:12px}
  .intro h1 b{background:linear-gradient(100deg,var(--teal),var(--cyan),var(--blue));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .intro .lead{font-size:14.5px;color:var(--muted);margin-top:12px;max-width:420px;line-height:1.6}
  /* Selector de plan (desplegable) */
  .picker{position:relative;width:100%;max-width:460px;margin-top:30px;text-align:left}
  .picker-btn{width:100%;display:flex;align-items:center;gap:10px;padding:15px 17px;cursor:pointer;
    font-family:inherit;font-size:15px;border-radius:15px;border:1px solid var(--panel-line);
    background:var(--panel);color:var(--ink);backdrop-filter:blur(8px);transition:.18s}
  .picker-btn:hover{border-color:rgba(34,211,238,.55)}
  .picker.open .picker-btn{border-color:var(--cyan);box-shadow:0 0 0 4px rgba(34,211,238,.14)}
  .picker-lbl{flex:1;min-width:0;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .picker-lbl.ph{color:var(--faint);font-weight:600}
  .lbl-a{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
    color:var(--cyan);margin-right:8px}
  .chev{flex:0 0 auto;width:18px;height:18px;stroke:var(--muted);stroke-width:2.6;fill:none;
    stroke-linecap:round;stroke-linejoin:round;transition:.25s}
  .picker.open .chev{transform:rotate(180deg)}
  .picker-menu{top:calc(100% + 8px);left:0;right:0;z-index:40;
    max-height:215px;overflow-y:auto;padding:6px;border-radius:15px;
    background:#0C1526;border:1px solid var(--panel-line);box-shadow:0 26px 64px rgba(0,0,0,.6);
    opacity:0;transform:translateY(-8px);pointer-events:none;transition:.18s}
  .picker.open .picker-menu{opacity:1;transform:none;pointer-events:auto}
  .picker-menu::-webkit-scrollbar{width:7px}
  .picker-menu::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:10px}
  .grp{font-size:10px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;
    color:var(--faint);padding:12px 12px 6px}
  .grp:first-child{padding-top:6px}
  .opt-plan{width:100%;display:flex;align-items:center;gap:10px;padding:11px 12px;cursor:pointer;
    font-family:inherit;text-align:left;border:none;background:none;color:var(--ink);
    border-radius:10px;transition:.14s}
  .opt-plan:hover{background:rgba(34,211,238,.10)}
  .opt-plan.sel{background:rgba(34,211,238,.14)}
  .opt-plan .nm{flex:1;font-size:14px;font-weight:600}
  .opt-plan .ck{flex:0 0 auto;width:16px;height:16px;opacity:0;stroke:var(--cyan);stroke-width:3;
    fill:none;stroke-linecap:round;stroke-linejoin:round}
  .opt-plan.sel .ck{opacity:1}
  .go{width:100%;max-width:460px;margin-top:18px;padding:15px;border:none;border-radius:14px;cursor:pointer;
    font-family:inherit;font-size:15px;font-weight:700;color:#04121d;
    background:linear-gradient(100deg,var(--teal),var(--cyan));transition:.2s;
    box-shadow:0 14px 32px rgba(34,211,238,.30)}
  .go:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 18px 40px rgba(34,211,238,.42)}
  .go:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  /* ============ CONSOLA ============ */
  .console{position:relative;flex:1;display:flex;flex-direction:column;min-height:0;animation:fade .5s ease both}
  .console.hidden,.intro.hidden{display:none}
  .top{display:flex;align-items:center;gap:11px;padding:18px 2px 14px}
  .top .orb{width:30px;height:30px}
  .top .nm{font-weight:800;font-size:15.5px;letter-spacing:-.01em}
  .top .who-top{display:flex;flex-direction:column;line-height:1.15}
  .top .role{display:flex;align-items:center;gap:6px;font-size:10.5px;font-weight:600;color:var(--muted);margin-top:1px}
  .top .role .dotmini{width:6px;height:6px;border-radius:50%;background:var(--mint);
    box-shadow:0 0 0 0 rgba(52,224,176,.6);animation:pulse 1.9s infinite}
  .pill{margin-left:auto;display:inline-flex;align-items:center;gap:9px;padding:6px 7px 6px 13px;
    border-radius:30px;background:var(--panel);border:1px solid var(--panel-line);font-size:12px;font-weight:600;
    color:var(--muted);backdrop-filter:blur(8px)}
  .pill b{color:var(--ink);font-weight:700}
  .pill button{width:24px;height:24px;border-radius:50%;border:none;cursor:pointer;display:grid;place-items:center;
    background:rgba(255,255,255,.08);color:var(--muted);transition:.18s}
  .pill button:hover{background:rgba(255,255,255,.18);color:var(--ink);transform:rotate(12deg)}
  .pill svg{width:11px;height:11px;stroke:currentColor;stroke-width:2.4;fill:none;stroke-linecap:round}

  .thread{flex:1;overflow-y:auto;padding:8px 2px 14px;display:flex;flex-direction:column;gap:30px}
  .thread::-webkit-scrollbar{width:7px}
  .thread::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:10px}

  .turn{animation:rise .45s cubic-bezier(.2,.75,.3,1) both}
  .q{display:flex;gap:9px;align-items:baseline;font-size:16.5px;font-weight:700;letter-spacing:-.01em;
    line-height:1.4;color:var(--ink)}
  .q .qd{flex:0 0 auto;margin-top:7px;width:7px;height:7px;border-radius:50%;
    background:linear-gradient(var(--cyan),var(--blue))}
  .a{margin-top:14px}
  .who{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--cyan);
    letter-spacing:.04em;margin-bottom:9px}
  .who .orb{width:18px;height:18px}
  .atext{font-size:15px;line-height:1.65;color:#D6E1F2}
  .atext.streaming::after{content:"";display:inline-block;width:8px;height:17px;margin-left:2px;
    vertical-align:-3px;background:var(--cyan);border-radius:2px;animation:caret .8s steps(1) infinite}
  @keyframes caret{50%{opacity:0}}
  .statusline{display:flex;align-items:center;gap:9px;font-size:14px;color:var(--muted);font-weight:500}
  .statusline .ld{display:inline-flex;gap:4px}
  .statusline .ld i{width:5px;height:5px;border-radius:50%;background:var(--cyan);opacity:.4;
    animation:blink 1.1s infinite}
  .statusline .ld i:nth-child(2){animation-delay:.18s}
  .statusline .ld i:nth-child(3){animation-delay:.36s}
  @keyframes blink{0%,60%,100%{opacity:.3}30%{opacity:1}}

  /* Panel de resultado */
  .panel{margin-top:16px;border-radius:18px;overflow:hidden;border:1px solid var(--panel-line);
    background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));backdrop-filter:blur(14px);
    box-shadow:0 18px 50px rgba(0,0,0,.35);animation:pop .55s cubic-bezier(.2,.8,.2,1.1) both}
  @keyframes pop{from{opacity:0;transform:scale(.96) translateY(10px)}to{opacity:1;transform:none}}
  .best{position:relative;padding:18px 20px;border-bottom:1px solid var(--panel-line);
    background:radial-gradient(120% 140% at 0% 0%,rgba(52,224,176,.16),transparent 60%)}
  .best::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;
    background:linear-gradient(var(--mint),var(--cyan))}
  .tag{display:inline-flex;align-items:center;gap:7px;font-size:10.5px;font-weight:800;letter-spacing:.12em;
    text-transform:uppercase;color:var(--mint)}
  .tag .ring{width:8px;height:8px;border-radius:50%;background:var(--mint);
    box-shadow:0 0 0 0 rgba(52,224,176,.6);animation:pulse 1.9s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(52,224,176,.5)}70%{box-shadow:0 0 0 9px rgba(52,224,176,0)}100%{box-shadow:0 0 0 0 rgba(52,224,176,0)}}
  .best .name{font-size:17px;font-weight:700;margin-top:6px}
  .best .price{font-family:'IBM Plex Mono',monospace;font-size:38px;font-weight:700;margin-top:9px;line-height:1;
    background:linear-gradient(100deg,#fff,var(--teal));-webkit-background-clip:text;background-clip:text;
    color:transparent;letter-spacing:-.02em}
  .best .sub{font-size:13px;color:var(--muted);margin-top:9px;font-weight:500}
  .opt{display:flex;align-items:center;gap:12px;padding:13px 20px;animation:rise .4s ease both}
  .opt+.opt{border-top:1px solid rgba(255,255,255,.06)}
  .opt .h{font-size:14px;font-weight:600}
  .opt .r{font-size:11.5px;color:var(--faint);margin-top:2px}
  .opt .c{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:15px;color:var(--ink)}
  .opt.win{background:rgba(52,224,176,.08)}.opt.win .c{color:var(--mint)}

  /* Dock de entrada */
  .dock{padding:6px 0 22px}
  .sugg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:13px}
  .chip{cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:600;padding:9px 14px;border-radius:30px;
    background:var(--panel);border:1px solid var(--panel-line);color:var(--muted);transition:.18s;
    backdrop-filter:blur(8px);animation:rise .5s ease both}
  .chip:hover{border-color:rgba(34,211,238,.55);color:var(--ink);transform:translateY(-2px)}
  .bar{display:flex;align-items:flex-end;gap:10px;padding:8px 8px 8px 18px;border-radius:18px;
    background:rgba(255,255,255,.06);border:1px solid var(--panel-line);backdrop-filter:blur(14px);
    transition:.2s;box-shadow:0 10px 34px rgba(0,0,0,.3)}
  .bar:focus-within{border-color:var(--cyan);box-shadow:0 0 0 4px rgba(34,211,238,.16),0 10px 34px rgba(0,0,0,.3)}
  textarea{flex:1;border:none;background:none;outline:none;resize:none;color:var(--ink);font-family:inherit;
    font-size:15px;line-height:1.5;max-height:130px;padding:9px 0}
  textarea::placeholder{color:var(--faint)}
  .send{width:44px;height:44px;flex:0 0 auto;border:none;border-radius:13px;cursor:pointer;display:grid;
    place-items:center;color:#04121d;background:linear-gradient(120deg,var(--teal),var(--cyan));transition:.2s;
    box-shadow:0 8px 20px rgba(34,211,238,.34)}
  .send:hover{transform:translateY(-2px) scale(1.04)}
  .send:active{transform:scale(.95)}.send:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .send svg{width:19px;height:19px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .trust{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:11px;font-size:10.5px;
    color:var(--faint);font-weight:600}
  .trust svg{width:12px;height:12px;stroke:var(--mint);stroke-width:2.3;fill:none;stroke-linecap:round;stroke-linejoin:round}

  @media (max-width:520px){.intro h1{font-size:25px}.best .price{font-size:32px}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

  <!-- ===== INTRO: presencia de la IA + selección de plan ===== -->
  <section class="intro" id="intro">
    <div class="orb"></div>
    <div class="eyebrow">Asistente clínico con IA</div>
    <h1>Hola, soy <b>Clara</b></h1>
    <p class="lead">Te ayudo a saber, antes de atenderte, qué especialista necesitas y cuánto pagarías en cada hospital de tu red. Para empezar, dime cuál es tu plan.</p>
    <div class="picker" id="picker">
      <button class="picker-btn" id="pickerBtn" type="button">
        <span class="picker-lbl ph" id="pickerLabel">Selecciona tu plan de seguro</span>
        <svg class="chev" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
      </button>
      <div class="picker-menu" id="pickerMenu"></div>
    </div>
    <button class="go" id="continue" disabled>Comenzar</button>
  </section>

  <!-- ===== CONSOLA ===== -->
  <section class="console hidden" id="console">
    <div class="top">
      <div class="orb"></div>
      <div class="who-top">
        <span class="nm">Clara</span>
        <span class="role"><i class="dotmini"></i> Asistente IA · en línea</span>
      </div>
      <span class="pill">
        <span id="planText">—</span>
        <button id="changePlan" title="Cambiar plan">
          <svg viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
        </button>
      </span>
    </div>

    <div class="thread" id="thread"></div>

    <div class="dock">
      <div class="sugg" id="sugg"></div>
      <div class="bar">
        <textarea id="input" rows="1" placeholder="Cuéntame cómo te sientes…"></textarea>
        <button class="send" id="send">
          <svg viewBox="0 0 24 24"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </button>
      </div>
      <p class="trust">
        <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Montos calculados desde la base del seguro · no se inventan
      </p>
    </div>
  </section>
</div>

<script>
const API='chat.php', PLANES_API='planes.php';
const $=id=>document.getElementById(id);
const intro=$('intro'),consoleEl=$('console'),goBtn=$('continue');
const picker=$('picker'),pickerBtn=$('pickerBtn'),pickerLabel=$('pickerLabel'),pickerMenu=$('pickerMenu');
const thread=$('thread'),input=$('input'),send=$('send'),sugg=$('sugg');
const planText=$('planText'),changePlan=$('changePlan'),topOrb=consoleEl.querySelector('.top .orb');
const STARTERS=['Tengo dolor en el pecho','A mi bebé le dio fiebre','Me lastimé el tobillo','Me salieron manchas en la piel'];
const THINKING=['Analizando tus síntomas','Identificando la especialidad','Consultando tu cobertura','Comparando hospitales de tu red'];
let selectedPlanId=null,currentPlanLabel='',busy=false;

const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const money=n=>'$'+Number(n).toFixed(2);
const DOTS='<span class="ld"><i></i><i></i><i></i></span>';

/* ---------- Cargar planes en el desplegable ---------- */
async function loadPlanes(){
  try{
    const r=await fetch(PLANES_API);const data=await r.json();
    if(!data.ok)throw new Error(data.error||'No se pudieron cargar los planes');
    pickerMenu.innerHTML='';
    let lastAseg=null;
    data.planes.forEach(p=>{
      if(p.aseguradora!==lastAseg){
        lastAseg=p.aseguradora;
        const g=document.createElement('div');g.className='grp';g.textContent=p.aseguradora;
        pickerMenu.appendChild(g);
      }
      const b=document.createElement('button');b.type='button';b.className='opt-plan';
      b.innerHTML=`<span class="nm">${esc(p.nombre)}</span>`+
        `<svg class="ck" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>`;
      b.onclick=()=>{
        pickerMenu.querySelectorAll('.opt-plan.sel').forEach(c=>c.classList.remove('sel'));
        b.classList.add('sel');
        selectedPlanId=p.id;currentPlanLabel=p.etiqueta;goBtn.disabled=false;
        pickerLabel.classList.remove('ph');
        pickerLabel.innerHTML=`<span class="lbl-a">${esc(p.aseguradora)}</span>${esc(p.nombre)}`;
        picker.classList.remove('open');
      };
      pickerMenu.appendChild(b);
    });
  }catch(e){
    pickerMenu.innerHTML=`<p style="color:#ff8585;font-size:13px;padding:14px;line-height:1.5">⚠️ ${esc(e.message)}<br><small style="color:var(--faint)">Revisa que XAMPP / MySQL estén activos.</small></p>`;
    picker.classList.add('open');
  }
}

pickerBtn.addEventListener('click',e=>{e.stopPropagation();picker.classList.toggle('open');});
document.addEventListener('click',e=>{if(!picker.contains(e.target))picker.classList.remove('open');});

goBtn.addEventListener('click',async()=>{
  if(!selectedPlanId)return;
  goBtn.disabled=true;goBtn.textContent='Conectando…';
  try{
    const r=await fetch(`${API}?set_plan=${selectedPlanId}`);const data=await r.json();
    if(!data.ok)throw new Error(data.error||'No se pudo guardar el plan');
    planText.innerHTML=`<b>${esc(currentPlanLabel)}</b>`;
    intro.classList.add('hidden');consoleEl.classList.remove('hidden');
    greet();input.focus();
  }catch(e){alert('Error: '+e.message);goBtn.disabled=false;goBtn.textContent='Comenzar';}
});

changePlan.addEventListener('click',async()=>{
  await fetch(API+'?reset=1');
  selectedPlanId=null;currentPlanLabel='';goBtn.disabled=true;goBtn.textContent='Comenzar';
  pickerMenu.querySelectorAll('.opt-plan.sel').forEach(c=>c.classList.remove('sel'));
  pickerLabel.textContent='Selecciona tu plan de seguro';pickerLabel.classList.add('ph');
  picker.classList.remove('open');
  thread.innerHTML='';consoleEl.classList.add('hidden');intro.classList.remove('hidden');
});

/* ---------- Entrada de Clara + saludo ---------- */
async function greet(){
  thread.innerHTML='';
  // Secuencia "Despertar": Clara se enciende
  const ov=document.createElement('div');ov.className='awaken';
  ov.innerHTML=`<div class="scene">
      <div class="flash"></div><div class="ring"></div><div class="ring"></div><div class="ring"></div>
      <div class="orb"></div>
    </div><div class="lbl">Clara · activando IA</div>`;
  consoleEl.appendChild(ov);
  await sleep(1250);
  ov.classList.add('out');
  setTimeout(()=>ov.remove(),550);

  // Saludo conversacional
  const t=document.createElement('div');t.className='turn';
  t.innerHTML=`<div class="a"><div class="who"><span class="orb"></span> Clara</div>
    <div class="atext"></div></div>`;
  thread.appendChild(t);
  await streamText(t.querySelector('.atext'),
    `Tu plan ${currentPlanLabel} está activo. Cuéntame qué molestia o síntoma tienes; te haré un par de preguntas y luego te diré a qué especialista acudir, tu copago y el hospital de tu red que más te conviene.`);
  showSugg();
}
function showSugg(){
  sugg.innerHTML='';
  STARTERS.forEach((s,i)=>{const c=document.createElement('button');c.className='chip';c.textContent=s;
    c.style.animationDelay=(i*.06)+'s';c.onclick=()=>{input.value=s;ask();};sugg.appendChild(c);});
}

/* ---------- Texto generativo (se escribe solo) ---------- */
async function streamText(el,text){
  el.classList.add('streaming');
  const tokens=esc(text).replace(/\n/g,'<br>').split(/(<br>|\s+)/);
  el.innerHTML='';
  for(const tk of tokens){el.innerHTML+=tk;thread.scrollTop=thread.scrollHeight;await sleep(tk.trim()?26:8);}
  el.classList.remove('streaming');
}

/* ---------- Panel de resultado ---------- */
function resultPanel(d){
  if(!d||!d.recomendado)return'';
  const best=d.recomendado;
  const opts=d.opciones.map((o,i)=>{
    const win=o.nombre===best.nombre?' win':'';
    return `<div class="opt${win}" style="animation-delay:${.2+i*.09}s"><div><div class="h">${esc(o.nombre)}</div>
      <div class="r">${esc(o.red)} · cubre ${o.porcentaje_cobertura}%</div></div>
      <div class="c">${money(o.copago)}</div></div>`;
  }).join('');
  return `<div class="panel"><div class="best">
      <div class="tag"><span class="ring"></span> Opción más económica</div>
      <div class="name">${esc(best.nombre)}</div>
      <div class="price" data-val="${best.copago}">$0.00</div>
      <div class="sub">Tu copago en ${esc(d.especialidad)} · el seguro cubre el ${best.porcentaje_cobertura}%</div>
    </div>${opts}</div>`;
}
function countUp(el){
  const target=parseFloat(el.dataset.val);let s=null;
  (function step(t){if(!s)s=t;const p=Math.min((t-s)/750,1);const e=1-Math.pow(1-p,3);
    el.textContent='$'+(target*e).toFixed(2);if(p<1)requestAnimationFrame(step);})(performance.now());
}

/* ---------- Pregunta → respuesta ---------- */
async function ask(){
  const msg=input.value.trim();if(!msg||busy)return;
  busy=true;send.disabled=true;sugg.innerHTML='';input.value='';grow();

  // Bloque del turno: pregunta + respuesta
  const turn=document.createElement('div');turn.className='turn';
  turn.innerHTML=`<div class="q"><span class="qd"></span><span>${esc(msg)}</span></div>
    <div class="a"><div class="who"><span class="orb think"></span> Clara</div>
      <div class="statusline" id="st"></div></div>`;
  thread.appendChild(turn);thread.scrollTop=thread.scrollHeight;
  topOrb.classList.add('think');

  // Estados de "pensando": avanzan por la lista y se mantienen en el último
  const st=turn.querySelector('#st');st.removeAttribute('id');let si=0;
  st.innerHTML=`<span>${THINKING[0]}</span>${DOTS}`;
  const tick=setInterval(()=>{
    if(si<THINKING.length-1){si++;st.innerHTML=`<span>${THINKING[si]}</span>${DOTS}`;}
  },850);

  try{
    const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mensaje:msg})});
    const data=await r.json();
    clearInterval(tick);
    const a=turn.querySelector('.a');
    a.querySelector('.who .orb').classList.remove('think');
    topOrb.classList.remove('think');

    if(!data.ok){st.outerHTML=`<div class="atext">⚠️ ${esc(data.error||'Ocurrió un error.')}</div>`;}
    else{
      st.outerHTML=`<div class="atext"></div>`;
      const tx=a.querySelector('.atext');
      await streamText(tx,data.respuesta||'¿Podrías darme un poco más de detalle?');
      if(data.datos&&data.datos.recomendado){
        await sleep(220);
        const holder=document.createElement('div');holder.innerHTML=resultPanel(data.datos);
        a.appendChild(holder.firstElementChild);
        const price=a.querySelector('.price');if(price)countUp(price);
        thread.scrollTop=thread.scrollHeight;
      }
    }
  }catch(e){
    clearInterval(tick);topOrb.classList.remove('think');
    const a=turn.querySelector('.a');a.querySelector('.who .orb')?.classList.remove('think');
    turn.querySelector('.statusline').outerHTML=`<div class="atext">⚠️ Sin conexión con el servidor. Revisa que Apache y MySQL estén activos en XAMPP.</div>`;
  }
  busy=false;send.disabled=false;input.focus();thread.scrollTop=thread.scrollHeight;
}

function grow(){input.style.height='auto';input.style.height=Math.min(input.scrollHeight,130)+'px';}
input.addEventListener('input',grow);
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();ask();}});
send.addEventListener('click',ask);

loadPlanes();
</script>
</body>
</html>
